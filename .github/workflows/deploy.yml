name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment target'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build
        run: |
          cd frontend && npm ci
          npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_DEMO_MODE: "false"

      - name: Deploy to Strato via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.STRATO_HOST }}
          username: ${{ secrets.STRATO_USER }}
          password: ${{ secrets.STRATO_PASSWORD }}
          local_path: ./frontend/dist/
          remote_path: /cleancheck/
          sftp_only: true
